# Label Studio for the human-verification stage.
# Frames are served from the local ./data dir (LS can't see arbitrary host
# paths otherwise). Tasks reference images as /data/local-files/?d=<relpath>.
#
#   docker compose up -d           # start (first boot ~30-60s for DB migrate)
#   docker compose logs -f         # watch
#   docker compose down            # stop (keeps the ls-data volume)
services:
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: labeling-t-ls
    ports:
      - "8080:8080"
    environment:
      # auto-create an admin + a fixed legacy API token so the scripts can auth
      LABEL_STUDIO_USERNAME: admin@labeling-t.local
      LABEL_STUDIO_PASSWORD: labeling-t-admin
      LABEL_STUDIO_USER_TOKEN: "0a1b2c3d4e5f60718293a4b5c6d7e8f901234567"
      LABEL_STUDIO_LEGACY_API_TOKEN_ENABLED: "true"
    volumes:
      - ls-data:/label-studio/data           # LS database/state

  # Static server for the frames. The labeler's browser loads images directly
  # from here (http://localhost:8081/<relpath>), which sidesteps LS's
  # storage-tied local-files serving. For production you'd point tasks at S3
  # presigned URLs instead.
  images:
    image: nginx:alpine
    container_name: labeling-t-images
    ports:
      - "8081:80"
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx/images.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  ls-data:
