# Static frame server for Label Studio. LS loads images onto a canvas with
# crossorigin, so the browser needs CORS headers from a different origin (:8081
# vs LS on :8080). Wide-open CORS is fine for local dev.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) { return 204; }
        try_files $uri =404;
    }
}
